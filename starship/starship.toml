# Starship Prompt — Tokyo Night minimal single-line

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$docker_context\
$cmd_duration\
$character"""

[character]
success_symbol = "[❯](#7aa2f7)"
error_symbol = "[❯](#f7768e)"

[directory]
style = "bold #769ff0"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "#bb9af7"

[git_status]
style = "#e0af68"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"

[python]
symbol = " "
style = "#9ece6a"
format = "[$symbol($virtualenv) ]($style)"

[nodejs]
symbol = " "
style = "#9ece6a"

[docker_context]
symbol = " "
style = "#7dcfff"

[line_break]
disabled = true

[cmd_duration]
min_time = 2_000
style = "#565f89"
format = "[$duration ]($style)"
