# Starship Prompt Configuration
# Tokyo Night inspired colors

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$docker_context\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"

[python]
symbol = " "
style = "bold yellow"
format = "via [${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"

[nodejs]
symbol = " "
style = "bold green"

[docker_context]
symbol = " "
style = "bold blue"

[line_break]
disabled = true

[cmd_duration]
min_time = 2_000
style = "bold yellow"
