# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# Copy / Paste
copy_on_select yes
mouse_map right press ungrabbed paste_from_clipboard

# Window padding
window_padding_width 8

# Background opacity + blur
background_opacity 0.85
background_blur 0

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold
inactive_tab_font_style normal

# Shell
shell /usr/bin/zsh

# Misc
confirm_os_window_close 0
enable_audio_bell no
url_style curly

# ── Tokyo Night theme ──

foreground #a9b1d6
background #1a1b26
selection_foreground #a9b1d6
selection_background #33467c
url_color #73daca
cursor #c0caf5
cursor_text_color #1a1b26

# Tab bar colors
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #545c7e
inactive_tab_background #292e42

# Normal colors
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

# Bright colors
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5
